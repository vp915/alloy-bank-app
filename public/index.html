<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atlas Bank — Apply</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      font-family: sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    form {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    .section {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      margin: 24px 0 16px;
    }

    .section:first-child { margin-top: 0; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      padding: 13px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
    }

    button[type="submit"].loading { opacity: 0.5; pointer-events: none; }


  </style>
</head>
<body>

  <h1>Atlas Bank</h1>

  <form id="applyForm">

    <div class="section">Personal Information</div>

    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="name_first" placeholder="John" required />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="name_last" placeholder="Smith" required />
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email_address" placeholder="john@example.com" required />
    </div>

    <div class="row">
      <div class="field">
        <label>Date of Birth</label>
        <input type="text" id="birth_date" placeholder="YYYY-MM-DD" required />
      </div>
      <div class="field">
        <label>Social Security No.</label>
        <input type="text" id="document_ssn" placeholder="123456789" maxlength="9" required />
      </div>
    </div>

    <div class="section">Home Address</div>

    <div class="field">
      <label>Address Line 1</label>
      <input type="text" id="address_line_1" placeholder="123 Main St" required />
    </div>

    <div class="field">
      <label>Address Line 2 <span style="opacity:0.4">(optional)</span></label>
      <input type="text" id="address_line_2" placeholder="Apt 4B" />
    </div>

    <div class="row">
      <div class="field">
        <label>City</label>
        <input type="text" id="address_city" placeholder="New York" required />
      </div>
      <div class="field">
        <label>State</label>
        <input type="text" id="address_state" placeholder="NY" maxlength="2" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>ZIP Code</label>
        <input type="text" id="address_postal_code" placeholder="10001" required />
      </div>
      <div class="field">
        <label>Country</label>
        <input type="text" value="US" disabled />
      </div>
    </div>
    <button type="submit" id="submitBtn">Submit Application</button>

  </form>

</body>
</html>
