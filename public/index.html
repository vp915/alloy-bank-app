<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atlas Bank — Apply</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      font-family: 'Inter', sans-serif;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    form {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
    }

    .section {
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 1px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 8px;
      margin: 24px 0 16px;
    }

    .section:first-child { margin-top: 0; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 28px;
      padding: 13px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: transparent;
    }

    button[type="submit"].loading { opacity: 0.5; pointer-events: none; }

    #result {
  display: none;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 56px 40px;
  width: 100%;
  max-width: 520px;
  text-align: center;
}

#resultIcon { font-size: 44px; display: block; margin-bottom: 16px; }
#resultTitle { font-size: 20px; margin-bottom: 12px; }
#resultMessage { font-size: 15px; line-height: 1.6; margin-bottom: 28px; }

.back-btn {
  padding: 9px 22px;
  cursor: pointer;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: transparent;
}

  </style>
</head>
<body>

  <h1>Atlas Bank</h1>

  <form id="applyForm">

    <div class="section">Personal Information</div>

    <div class="row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="name_first" placeholder="John" required />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="name_last" placeholder="Smith" required />
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email_address" placeholder="john@example.com" required />
    </div>

    <div class="row">
      <div class="field">
        <label>Date of Birth</label>
        <input type="text" id="birth_date" placeholder="YYYY-MM-DD" required />
      </div>
      <div class="field">
        <label>Social Security No.</label>
        <input type="text" id="document_ssn" placeholder="123456789" maxlength="9" required />
      </div>
    </div>

    <div class="section">Home Address</div>

    <div class="field">
      <label>Address Line 1</label>
      <input type="text" id="address_line_1" placeholder="123 Main St" required />
    </div>

    <div class="field">
      <label>Address Line 2 <span style="opacity:0.4">(optional)</span></label>
      <input type="text" id="address_line_2" placeholder="Apt 4B" />
    </div>

    <div class="row">
      <div class="field">
        <label>City</label>
        <input type="text" id="address_city" placeholder="New York" required />
      </div>
      <div class="field">
        <label>State</label>
        <input type="text" id="address_state" placeholder="NY" maxlength="2" required />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>ZIP Code</label>
        <input type="text" id="address_postal_code" placeholder="10001" required />
      </div>
      <div class="field">
        <label>Country</label>
        <input type="text" value="US" disabled />
      </div>
    </div>
    <button type="submit" id="submitBtn">Submit Application</button>

  </form>

  <div id="result">
    <span id="resultIcon"></span>
    <div id="resultTitle"></div>
    <p id="resultMessage"></p>
    <button class="back-btn" onclick="resetForm()">← New Application</button>
  </div>

<script>
  const outcomes = {
    'Approved':      { icon: '✅', title: 'Approved',      message: 'Your account has been created.',              css: 'approved' },
    'Manual Review': { icon: '🔍', title: 'Under Review',  message: 'We will be in touch shortly.',                css: 'review'   },
    'Deny':          { icon: '❌', title: 'Denied',         message: 'Sorry, your application was not successful.', css: 'denied'   }
  };

  document.getElementById('applyForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Processing…';
    btn.classList.add('loading');

    const formData = {
      name_first:          document.getElementById('name_first').value.trim(),
      name_last:           document.getElementById('name_last').value.trim(),
      email_address:       document.getElementById('email_address').value.trim(),
      birth_date:          document.getElementById('birth_date').value.trim(),
      document_ssn:        document.getElementById('document_ssn').value.trim(),
      address_line_1:      document.getElementById('address_line_1').value.trim(),
      address_line_2:      document.getElementById('address_line_2').value.trim(),
      address_city:        document.getElementById('address_city').value.trim(),
      address_state:       document.getElementById('address_state').value.trim().toUpperCase(),
      address_postal_code: document.getElementById('address_postal_code').value.trim(),
    };

    try {
      const response = await fetch('/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
      });
      const data = await response.json();
      showResult(data.outcome);
    } catch (err) {
      showResult('Error');
    }
  });

  function showResult(outcome) {
    const content = outcomes[outcome] || { icon: '⚠️', title: 'Something Went Wrong', message: 'Please try again.', css: 'denied' };
    document.getElementById('resultIcon').textContent    = content.icon;
    document.getElementById('resultTitle').textContent   = content.title;
    document.getElementById('resultMessage').textContent = content.message;
    document.getElementById('applyForm').style.display   = 'none';
    document.getElementById('result').style.display      = 'block';
  }

  function resetForm() {
    document.getElementById('applyForm').reset();
    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Submit Application';
    btn.classList.remove('loading');
    document.getElementById('applyForm').style.display = 'block';
    document.getElementById('result').style.display    = 'none';
  }
</script>  
</body>
</html>
